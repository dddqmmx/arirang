name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug assembleRelease

    - name: Get Build Tools Version
      run: |
        # 获取最新的 build-tools 版本号并存入环境变量
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
        echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
        buildToolsVersion: ${{ env.BUILD_TOOLS_VERSION }}

    - name: Rename Signed APK
      run: |
        mv ${{ steps.sign_app.outputs.signedReleaseFile }} app/build/outputs/apk/release/arirang-v${{ github.run_number }}-release.apk
        echo "RELEASE_APK_PATH=app/build/outputs/apk/release/arirang-v${{ github.run_number }}-release.apk" >> $GITHUB_ENV

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: arirang-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: arirang-release
        path: ${{ env.RELEASE_APK_PATH }}

    - name: Create Nightly Pre-release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-${{ github.run_number }}
        name: Nightly Build ${{ github.run_number }}
        prerelease: true
        files: |
          app/build/outputs/apk/debug/*.apk
          ${{ env.RELEASE_APK_PATH }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup Old Nightly Revisions
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        gh release list --json tagName,isPrerelease --limit 100 \
          | jq -r '.[] | select(.isPrerelease and (.tagName | startswith("nightly"))) | .tagName' \
          | tail -n +4 \
          | xargs -r -I {} gh release delete {} --yes --cleanup-tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}