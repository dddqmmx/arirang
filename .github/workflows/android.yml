name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug assembleRelease

    - name: Get Build Tools Version
      run: |
        # 获取最新的 build-tools 版本号并存入环境变量
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
        echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
        buildToolsVersion: ${{ env.BUILD_TOOLS_VERSION }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: arirang-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: arirang-release
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          ${{ steps.sign_app.outputs.signedReleaseFile }}
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}
