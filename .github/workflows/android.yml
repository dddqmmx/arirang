name: Android CI

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Native Build Dependencies
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          "$SDKMANAGER" --install "ndk;23.1.7779620"

      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease :arirang-submodule:packageModule

      - name: Get Build Tools Version
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.BUILD_TOOLS_VERSION }}

      - name: Rename Signed APK
        run: |
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} app/build/outputs/apk/release/arirang-${{ github.ref_name }}-release.apk
          echo "RELEASE_APK_PATH=app/build/outputs/apk/release/arirang-${{ github.ref_name }}-release.apk" >> $GITHUB_ENV

      - name: Rename Submodule Zip
        run: |
          mv arirang-submodule/build/outputs/arirang-submodule.zip arirang-submodule/build/outputs/arirang-submodule-${{ github.ref_name }}.zip
          echo "SUBMODULE_ZIP_PATH=arirang-submodule/build/outputs/arirang-submodule-${{ github.ref_name }}.zip" >> $GITHUB_ENV

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: arirang-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: arirang-release
          path: ${{ env.RELEASE_APK_PATH }}

      - name: Upload Submodule Zip
        uses: actions/upload-artifact@v4
        with:
          name: arirang-submodule
          path: ${{ env.SUBMODULE_ZIP_PATH }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
            ${{ env.RELEASE_APK_PATH }}
            ${{ env.SUBMODULE_ZIP_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
